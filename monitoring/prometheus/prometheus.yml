global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'cloudpulse-python-app'
    static_configs:
      - targets: ['${app_private_ip}:80']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['${app_private_ip}:9100']
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8081']